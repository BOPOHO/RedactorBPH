<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VideoForge — видеоредактор</title>
    <style>
        :root {
            --bg: #0e0f13;
            --bg2: #15171d;
            --bg3: #1b1e26;
            --bg4: #22252f;
            --line: #2a2e3a;
            --line2: #343845;
            --txt: #e8e9ee;
            --txt-dim: #9498a6;
            --txt-faint: #5d6273;
            --accent: #7c5cff;
            --accent2: #52e0c4;
            --danger: #ff5c7a;
            --radius: 14px;
            --radius-sm: 10px;
            --tap: 50px;
            --ff: 'Segoe UI', Roboto, system-ui, sans-serif;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        html,
        body {
            margin: 0;
            height: 100%;
            background: var(--bg);
            color: var(--txt);
            font-family: var(--ff);
            overflow: hidden;
        }

        button {
            font-family: inherit;
            cursor: pointer;
        }

        input,
        select,
        textarea {
            font-family: inherit;
        }

        .hidden {
            display: none !important;
        }

        #app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh;
        }

        /* ---------- TOP BAR ---------- */
        .topbar {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 0 8px;
            height: 50px;
            background: var(--bg2);
            border-bottom: 1px solid var(--line);
            flex: 0 0 auto;
        }

        .tb-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            background: var(--bg3);
            border: 1px solid var(--line2);
            color: var(--txt);
            height: 42px;
            min-width: 42px;
            padding: 0 12px;
            border-radius: var(--radius-sm);
            font-size: 16px;
        }

        .tb-btn:active {
            transform: scale(.95);
        }

        .tb-btn.primary {
            background: linear-gradient(135deg, var(--accent), #5e3fe0);
            border: none;
            color: #fff;
            font-weight: 600;
            font-size: 14px;
        }

        .tb-spacer {
            flex: 1;
        }

        #autosaveTag {
            font-size: 10.5px;
            color: var(--txt-faint);
            white-space: nowrap;
        }

        /* ---------- CENTER / PREVIEW ---------- */
        .center {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
            background: #000;
            position: relative;
        }

        .preview-wrap {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        #bgBlur {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: blur(28px) brightness(.55);
            transform: scale(1.15);
        }

        #stage {
            position: relative;
            max-width: 100%;
            max-height: 100%;
            box-shadow: 0 10px 40px rgba(0, 0, 0, .6);
            border-radius: 2px;
        }

        .xform-box {
            position: absolute;
            border: 2px dashed var(--accent2);
            touch-action: none;
        }

        .xform-handle {
            position: absolute;
            width: 30px;
            height: 30px;
            background: #fff;
            border: 2px solid var(--accent2);
            border-radius: 8px;
            touch-action: none;
        }

        .xform-handle.nw {
            left: -15px;
            top: -15px;
        }

        .xform-handle.ne {
            right: -15px;
            top: -15px;
        }

        .xform-handle.sw {
            left: -15px;
            bottom: -15px;
        }

        .xform-handle.se {
            right: -15px;
            bottom: -15px;
        }

        .xform-rotate {
            position: absolute;
            top: -42px;
            left: 50%;
            transform: translateX(-50%);
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: var(--accent2);
            touch-action: none;
        }

        .xform-rotate::before {
            content: '';
            position: absolute;
            left: 50%;
            top: 100%;
            width: 1px;
            height: 18px;
            background: var(--accent2);
        }

        .transport {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 10px;
            background: var(--bg2);
            border-top: 1px solid var(--line);
            flex: 0 0 auto;
        }

        .transport-btn {
            background: var(--bg3);
            border: 1px solid var(--line2);
            color: var(--txt);
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }

        .transport-btn.play {
            width: 48px;
            height: 48px;
            background: var(--accent);
            border: none;
            font-size: 18px;
        }

        .tcode {
            font-family: monospace;
            font-size: 11.5px;
            color: var(--txt-dim);
            white-space: nowrap;
        }

        .ratio-btn {
            margin-left: auto;
            background: var(--bg3);
            border: 1px solid var(--line2);
            color: var(--txt-dim);
            height: 36px;
            padding: 0 12px;
            border-radius: 18px;
            font-size: 12.5px;
        }

        /* ---------- TIMELINE ---------- */
        .timeline-wrap {
            flex: 0 0 auto;
            height: 200px;
            background: var(--bg2);
            border-top: 1px solid var(--line);
            display: flex;
            flex-direction: column;
        }

        .timeline-toolbar {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 8px;
            border-bottom: 1px solid var(--line);
            flex: 0 0 auto;
        }

        .timeline-toolbar .tb-btn {
            height: 40px;
            font-size: 13px;
        }

        .timeline-toolbar .tb-btn.wide {
            flex: 1;
            justify-content: center;
            background: linear-gradient(135deg, var(--accent), #5e3fe0);
            border: none;
            color: #fff;
            font-weight: 600;
        }

        .tl-scroll {
            flex: 1;
            display: flex;
            overflow: auto;
            position: relative;
        }

        .tl-heads {
            flex: 0 0 auto;
            width: 46px;
            background: var(--bg2);
            position: sticky;
            left: 0;
            z-index: 5;
            border-right: 1px solid var(--line);
        }

        .tl-ruler-spacer {
            height: 22px;
            border-bottom: 1px solid var(--line);
        }

        .track-head {
            height: 50px;
            border-bottom: 1px solid var(--line);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .tl-body {
            position: relative;
            flex: 1;
        }

        .tl-ruler {
            height: 22px;
            position: sticky;
            top: 0;
            background: var(--bg3);
            border-bottom: 1px solid var(--line);
            z-index: 4;
        }

        .tl-ruler .tick {
            position: absolute;
            top: 0;
            bottom: 0;
            border-left: 1px solid var(--line2);
            font-size: 9px;
            color: var(--txt-faint);
            padding-left: 3px;
            line-height: 22px;
        }

        .track-lane {
            height: 50px;
            border-bottom: 1px solid var(--line);
            position: relative;
            background: repeating-linear-gradient(90deg, rgba(255, 255, 255, .02) 0 1px, transparent 1px 40px);
        }

        .clip {
            position: absolute;
            top: 3px;
            bottom: 3px;
            border-radius: 8px;
            overflow: hidden;
            border: 1.5px solid transparent;
            display: flex;
            align-items: center;
            font-size: 11px;
            color: #fff;
            touch-action: none;
        }

        .clip.selected {
            border-color: #fff;
            box-shadow: 0 0 0 2px var(--accent);
        }

        .clip .clip-label {
            position: absolute;
            left: 6px;
            top: 3px;
            white-space: nowrap;
            text-shadow: 0 1px 2px rgba(0, 0, 0, .7);
            pointer-events: none;
            max-width: 90%;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .clip .clip-icons {
            position: absolute;
            right: 4px;
            bottom: 2px;
            font-size: 10px;
            opacity: .85;
        }

        .clip .handle {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 14px;
            z-index: 3;
            background: rgba(255, 255, 255, .18);
        }

        .clip .handle.l {
            left: 0;
            border-radius: 8px 0 0 8px;
        }

        .clip .handle.r {
            right: 0;
            border-radius: 0 8px 8px 0;
        }

        .playhead {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 2px;
            background: var(--accent2);
            z-index: 10;
            pointer-events: none;
        }

        .playhead::before {
            content: '';
            position: absolute;
            top: -3px;
            left: -5px;
            width: 12px;
            height: 12px;
            background: var(--accent2);
            border-radius: 2px;
        }

        .snapline {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 2px;
            background: #fff;
            z-index: 11;
            pointer-events: none;
            box-shadow: 0 0 6px #fff;
        }

        /* ---------- BOTTOM SHEET ---------- */
        .sheet-bg {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .5);
            z-index: 2000;
            display: flex;
            align-items: flex-end;
            opacity: 0;
            transition: opacity .2s;
        }

        .sheet-bg.show {
            opacity: 1;
        }

        .sheet {
            background: var(--bg2);
            width: 100%;
            max-height: 78vh;
            border-radius: 18px 18px 0 0;
            display: flex;
            flex-direction: column;
            transform: translateY(100%);
            transition: transform .22s ease;
            box-shadow: 0 -10px 40px rgba(0, 0, 0, .5);
        }

        .sheet-bg.show .sheet {
            transform: translateY(0);
        }

        .sheet-handle {
            width: 40px;
            height: 4px;
            background: var(--line2);
            border-radius: 2px;
            margin: 10px auto 4px;
            flex: 0 0 auto;
        }

        .sheet-head {
            display: flex;
            align-items: center;
            padding: 6px 16px 10px;
            font-size: 15px;
            font-weight: 600;
            flex: 0 0 auto;
        }

        .sheet-head .sheet-close {
            margin-left: auto;
            background: var(--bg3);
            border: none;
            color: var(--txt-dim);
            width: 34px;
            height: 34px;
            border-radius: 50%;
            font-size: 15px;
        }

        .sheet-body {
            overflow-y: auto;
            padding: 4px 16px 24px;
        }

        .sheet-tabs {
            display: flex;
            gap: 6px;
            padding: 0 16px 10px;
            overflow-x: auto;
            flex: 0 0 auto;
        }

        .sheet-tab {
            flex: 0 0 auto;
            background: var(--bg3);
            border: 1px solid var(--line2);
            color: var(--txt-dim);
            padding: 0 14px;
            height: 38px;
            border-radius: 19px;
            font-size: 13px;
            white-space: nowrap;
        }

        .sheet-tab.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }

        .grid3 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
        }

        .grid4 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 8px;
        }

        .opt-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            background: var(--bg3);
            border: 1px solid var(--line2);
            color: var(--txt);
            border-radius: var(--radius-sm);
            padding: 14px 4px;
            font-size: 12px;
            min-height: 74px;
        }

        .opt-btn .ic {
            font-size: 24px;
        }

        .opt-btn:active {
            background: var(--bg4);
        }

        .opt-btn.active {
            border-color: var(--accent);
            background: rgba(124, 92, 255, .15);
        }

        .panel-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: .5px;
            color: var(--txt-faint);
            margin: 14px 0 8px;
        }

        .panel-title:first-child {
            margin-top: 0;
        }

        .field {
            margin-bottom: 16px;
        }

        .field label {
            display: flex;
            justify-content: space-between;
            font-size: 12.5px;
            color: var(--txt-dim);
            margin-bottom: 8px;
        }

        .field label span {
            color: var(--accent2);
            font-family: monospace;
        }

        input[type=range] {
            width: 100%;
            height: 6px;
            -webkit-appearance: none;
            background: var(--line2);
            border-radius: 3px;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background: var(--accent);
            border: 3px solid rgba(255, 255, 255, .2);
        }

        textarea,
        input[type=text] {
            width: 100%;
            background: var(--bg3);
            border: 1px solid var(--line2);
            color: var(--txt);
            padding: 12px;
            border-radius: var(--radius-sm);
            font-size: 15px;
        }

        textarea {
            min-height: 70px;
            resize: vertical;
        }

        .btn-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .chip {
            background: var(--bg3);
            border: 1px solid var(--line2);
            color: var(--txt-dim);
            padding: 0 14px;
            height: 42px;
            border-radius: 21px;
            font-size: 13.5px;
            display: inline-flex;
            align-items: center;
        }

        .chip.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }

        .row-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .media-item {
            position: relative;
            background: var(--bg3);
            border: 1px solid var(--line);
            border-radius: 10px;
            overflow: hidden;
            aspect-ratio: 1/1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .media-item img,
        .media-item video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .media-item .mi-label {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, .65);
            font-size: 9px;
            padding: 3px 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .drop-zone {
            border: 1.5px dashed var(--line2);
            border-radius: var(--radius-sm);
            padding: 22px 10px;
            text-align: center;
            font-size: 14px;
            color: var(--txt-dim);
        }

        .note {
            font-size: 12px;
            color: var(--txt-faint);
            line-height: 1.5;
            margin-top: 6px;
            padding: 10px;
            background: var(--bg3);
            border-radius: var(--radius-sm);
            border-left: 2px solid var(--accent);
        }

        .empty-hint {
            font-size: 13px;
            color: var(--txt-faint);
            text-align: center;
            padding: 24px 10px;
        }

        /* ---------- TOAST ---------- */
        .toast-stack {
            position: fixed;
            bottom: 18px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            gap: 6px;
            z-index: 4000;
            align-items: center;
            pointer-events: none;
        }

        .toast {
            background: var(--bg4);
            border: 1px solid var(--line2);
            padding: 9px 16px;
            border-radius: 20px;
            font-size: 12.5px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, .4);
            animation: toastin .2s ease;
        }

        .toast.err {
            border-color: var(--danger);
            color: #ffd6dd;
        }

        @keyframes toastin {
            from {
                opacity: 0;
                transform: translateY(8px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        /* progress overlay */
        #exportOverlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .85);
            z-index: 5000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 14px;
            color: #fff;
        }

        #exportOverlay .bar {
            width: 70%;
            max-width: 320px;
            height: 10px;
            background: var(--bg4);
            border-radius: 5px;
            overflow: hidden;
        }

        #exportOverlay .bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            transition: width .15s;
        }

        .fullscreen-mode .topbar,
        .fullscreen-mode .timeline-wrap {
            display: none !important;
        }

        #btnExitFS {
            position: fixed;
            top: 12px;
            right: 12px;
            z-index: 1500;
            background: rgba(0, 0, 0, .6);
            border: 1.5px solid rgba(255, 255, 255, .3);
            color: #fff;
            padding: 0 14px;
            height: 42px;
            border-radius: 21px;
            font-size: 13px;
            display: none;
            align-items: center;
            gap: 6px;
        }

        .fullscreen-mode #btnExitFS {
            display: flex;
        }

        body.theme-light {
            --bg: #eef0f4;
            --bg2: #fff;
            --bg3: #f4f5f8;
            --bg4: #e8eaf0;
            --line: #e3e6ec;
            --line2: #d2d6e0;
            --txt: #1a1c24;
            --txt-dim: #585d6b;
            --txt-faint: #8c91a0;
        }
    </style>
</head>

<body>
    <div id="app">

        <div class="topbar">
            <button class="tb-btn" id="btnUndo" title="Отменить">↶</button>
            <button class="tb-btn" id="btnRedo" title="Повторить">↷</button>
            <span class="tb-spacer"></span>
            <span id="autosaveTag">Сохранено</span>
            <button class="tb-btn" id="btnTheme">🌙</button>
            <button class="tb-btn" id="btnFullscreen">⛶</button>
            <button class="tb-btn" id="btnAI">🤖</button>
            <button class="tb-btn primary" id="btnExport">Экспорт</button>
        </div>

        <div class="center">
            <div class="preview-wrap" id="previewWrap">
                <img id="bgBlur" class="hidden">
                <canvas id="stage" width="1280" height="720"></canvas>
                <div id="xformBox" class="xform-box hidden">
                    <div class="xform-handle nw" data-handle="nw"></div>
                    <div class="xform-handle ne" data-handle="ne"></div>
                    <div class="xform-handle sw" data-handle="sw"></div>
                    <div class="xform-handle se" data-handle="se"></div>
                    <div class="xform-rotate" data-handle="rotate"></div>
                </div>
            </div>
            <div class="transport">
                <button class="transport-btn" id="btnToStart">⏮</button>
                <button class="transport-btn play" id="btnPlay">▶</button>
                <span class="tcode" id="tcode">00:00 / 00:00</span>
                <button class="ratio-btn" id="btnRatio">16:9</button>
            </div>
        </div>

        <div class="timeline-wrap">
            <div class="timeline-toolbar">
                <button class="tb-btn wide" id="btnAddSheet">＋ Добавить</button>
                <button class="tb-btn" id="btnSplit" title="Разрезать">✂️</button>
                <button class="tb-btn" id="btnDup" title="Дублировать">⧉</button>
                <button class="tb-btn" id="btnDel" title="Удалить">🗑</button>
            </div>
            <div class="tl-scroll" id="tlScroll">
                <div class="tl-heads" id="tlHeads">
                    <div class="tl-ruler-spacer"></div>
                </div>
                <div class="tl-body" id="tlBody">
                    <div class="tl-ruler" id="tlRuler"></div>
                    <div class="tl-tracks" id="tlTracks"></div>
                    <div class="playhead" id="playhead" style="left:0"></div>
                    <div class="snapline hidden" id="snapline"></div>
                </div>
            </div>
        </div>
    </div>

    <button id="btnExitFS">✕ Выйти</button>
    <input type="file" id="fileInputMain" multiple accept="video/*,image/*" class="hidden">
    <input type="file" id="fileInputAudio" accept="audio/*" class="hidden">
    <input type="file" id="fileInputSticker" accept="image/*" class="hidden">
    <div id="mediaPool" style="position:fixed;left:-9999px;top:-9999px;width:2px;height:2px;overflow:hidden;"></div>
    <div class="toast-stack" id="toastStack"></div>
    <div id="exportOverlay" class="hidden">
        <div style="font-size:15px">Рендер видео…</div>
        <div class="bar">
            <div class="bar-fill" id="exportBarFill"></div>
        </div>
        <div id="exportPct" style="font-size:13px;color:#aaa">0%</div>
    </div>

    <script>
        /* =================== HELPERS =================== */
        const $ = (s, r = document) => r.querySelector(s);
        const $all = (s, r = document) => [...r.querySelectorAll(s)];
        const uid = () => 'id' + Math.random().toString(36).slice(2, 10) + Date.now().toString(36);
        const clamp = (v, a, b) => Math.min(b, Math.max(a, v));
        const lerp = (a, b, t) => a + (b - a) * t;
        function fmtTime(t) { if (!isFinite(t) || t < 0) t = 0; const m = Math.floor(t / 60), s = Math.floor(t % 60); return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`; }
        let lastToast = '', lastToastTime = 0;
        function toast(msg, isErr = false) {
            const now = Date.now();
            if (msg === lastToast && now - lastToastTime < 1500) return; // dedupe / anti-spam
            lastToast = msg; lastToastTime = now;
            const stack = $('#toastStack');
            if (stack.children.length >= 2) stack.firstChild.remove();
            const el = document.createElement('div'); el.className = 'toast' + (isErr ? ' err' : ''); el.textContent = msg;
            stack.appendChild(el);

            const rec = new SR(); rec.lang = 'ru-RU'; rec.continuous = true; rec.interimResults = false;
            rec.onresult = e => { const text = e.results[e.results.length - 1][0].transcript; const clip = makeClip('text', { dur: 2.5, text }); addClipToTrack(clip, state.currentTime); };
            rec.onerror = e => toast('Ошибка распознавания', true);
            rec.onend = () => { if (activeSpeechRec === rec) { try { rec.start(); } catch (e) { } } };
            rec.start(); activeSpeechRec = rec; toast('Говорите…');
        }
        async function aiAutoCutByScenes() {
            const f = findClip(state.selectedClipId);
            if (!f || f.clip.kind !== 'video') { toast('Выберите видеоклип', true); return; }
            toast('Анализ…');
            const c = f.clip, video = c.el;
            const off = document.createElement('canvas'); off.width = 64; off.height = 36; const octx = off.getContext('2d');
            let prev = null; const cuts = []; const step = 0.5; const dur = Math.min(c.sourceDur || video.duration, 40);
            for (let t = 0; t < dur; t += step) {
                await new Promise(res => { const onSeek = () => { video.removeEventListener('seeked', onSeek); res(); }; video.addEventListener('seeked', onSeek); try { video.currentTime = t; } catch (e) { res(); } });
                octx.drawImage(video, 0, 0, 64, 36);
                const cur = octx.getImageData(0, 0, 64, 36).data;
                if (prev) { let diff = 0; for (let i = 0; i < cur.length; i += 4) diff += Math.abs(cur[i] - prev[i]); diff /= (64 * 36); if (diff > 18) cuts.push(t); }
                prev = cur;
            }
            if (!cuts.length) { toast('Сцен не найдено', true); return; }
            cuts.forEach(t => splitClipAt(c.id, c.start + t));
            toast('Разрезано: ' + cuts.length);
        }

        /* =================== FILE INPUTS =================== */
        $('#fileInputMain').onchange = e => { importFiles(e.target.files); e.target.value = ''; };
        $('#fileInputAudio').onchange = e => { importFiles(e.target.files, 'audio'); e.target.value = ''; };
        $('#fileInputSticker').onchange = e => {
            const f = e.target.files[0]; e.target.value = ''; if (!f) return;
            const url = URL.createObjectURL(f); const id = uid();
            idbSaveMediaBlob(id, f.name, 'sticker', f);
            const img = new Image(); img.src = url;
            img.onload = () => { state.mediaLibrary.push({ id, name: f.name, kind: 'sticker', url, el: img, duration: 4, thumb: url }); toast('Стикер добавлен в библиотеку'); };
        };

        /* =================== TOP TOOLBAR =================== */
        $('#btnUndo').onclick = undo; $('#btnRedo').onclick = redo;
        $('#btnSplit').onclick = () => { if (state.selectedClipId) splitClipAt(state.selectedClipId, state.currentTime); else toast('Выберите клип', true); };
        $('#btnDup').onclick = () => { if (state.selectedClipId) duplicateClip(state.selectedClipId); else toast('Выберите клип', true); };
        $('#btnDel').onclick = () => { if (state.selectedClipId) deleteClip(state.selectedClipId); else toast('Выберите клип', true); };
        function toggleFullscreen() { document.body.classList.toggle('fullscreen-mode'); }
        $('#btnFullscreen').onclick = toggleFullscreen; $('#btnExitFS').onclick = toggleFullscreen;
        function applyTheme(t) { document.body.classList.toggle('theme-light', t === 'light'); $('#btnTheme').textContent = t === 'light' ? '☀️' : '🌙'; try { localStorage.setItem('vf_theme', t); } catch (e) { } }
        $('#btnTheme').onclick = () => applyTheme(document.body.classList.contains('theme-light') ? 'dark' : 'light');
        (function initTheme() { let saved = 'dark'; try { saved = localStorage.getItem('vf_theme') || 'dark'; } catch (e) { } applyTheme(saved); })();

        const RATIOS = ['16:9', '9:16', '1:1'];
        $('#btnRatio').onclick = () => {
            let idx = RATIOS.indexOf(state.ratio); idx = (idx + 1) % RATIOS.length; const r = RATIOS[idx];
            const [w, h] = r.split(':').map(Number); const base = 720;
            if (w >= h) { state.canvasW = Math.round(base * w / h); state.canvasH = base; if (state.canvasW > 1280) { state.canvasW = 1280; state.canvasH = Math.round(1280 * h / w); } }
            else { state.canvasH = 1280; state.canvasW = Math.round(1280 * w / h); }
            state.ratio = r; $('#btnRatio').textContent = r;
            stage.width = state.canvasW; stage.height = state.canvasH;
            pushHistory(); renderFrame(state.currentTime);
        };

        /* =================== EXPORT (MP4 only, optimized) =================== */
        function detectMp4Mime() {
            const candidates = ['video/mp4;codecs=avc1.42E01E,mp4a.40.2', 'video/mp4;codecs="avc1.42E01E"', 'video/mp4'];
            for (const c of candidates) { if (window.MediaRecorder && MediaRecorder.isTypeSupported && MediaRecorder.isTypeSupported(c)) return c; }
            return null;
        }
        $('#btnExport').onclick = async () => {
            const mime = detectMp4Mime();
            if (!mime) { toast('Этот браузер не поддерживает запись MP4. Обновите Chrome.', true); return; }
            if (!state.tracks.some(t => t.clips.length)) { toast('Сначала добавьте хотя бы один клип', true); return; }
            await runExport(mime);
        };
        async function runExport(mime) {
            isExporting = true;
            const overlay = $('#exportOverlay'); overlay.classList.remove('hidden');
            const fill = $('#exportBarFill'); const pct = $('#exportPct'); fill.style.width = '0%'; pct.textContent = '0%';
            $('#bgBlur').classList.add('hidden');

            // 720p for speed; matches project aspect ratio
            const projRatio = state.canvasW / state.canvasH;
            let outW = 1280, outH = Math.round(outW / projRatio);
            if (outH > 1280) { outH = 1280; outW = Math.round(outH * projRatio); }
            const exportCanvas = document.createElement('canvas'); exportCanvas.width = outW; exportCanvas.height = outH;
            const ectx = exportCanvas.getContext('2d');

            const wasPlaying = state.playing; stopPlayback();
            const dest = audioCtxMain.createMediaStreamDestination();
            state.tracks.forEach(tr => tr.clips.forEach(c => {
                if (c.el && (c.kind === 'video' || c.kind === 'music' || c.kind === 'voice')) {
                    try { if (!mediaGainNodes.has(c.id)) { const src = audioCtxMain.createMediaElementSource(c.el); const gain = audioCtxMain.createGain(); src.connect(gain); gain.connect(dest); mediaGainNodes.set(c.id, { src, gain }); } } catch (e) { }
                }
            }));

            const fps = 24;
            const videoStream = exportCanvas.captureStream(fps);
            const combined = new MediaStream([...videoStream.getVideoTracks(), ...dest.stream.getAudioTracks()]);
            let recorder;
            try { recorder = new MediaRecorder(combined, { mimeType: mime, videoBitsPerSecond: 4500000 }); }
            catch (e) { try { recorder = new MediaRecorder(combined, { mimeType: mime }); } catch (e2) { toast('Не удалось начать запись', true); overlay.classList.add('hidden'); isExporting = false; return; } }
            const chunks = []; recorder.ondataavailable = e => { if (e.data.size) chunks.push(e.data); };

            state.currentTime = 0; state.playing = true; lastFrameTs = null;
            recorder.start(250);
            const totalDur = state.duration;

            await new Promise(resolve => {
                function exportTick(ts) {
                    if (lastFrameTs == null) lastFrameTs = ts;
                    const dt = (ts - lastFrameTs) / 1000; lastFrameTs = ts;
                    state.currentTime += dt;
                    const p = clamp(state.currentTime / totalDur, 0, 1);
                    fill.style.width = (p * 100).toFixed(0) + '%'; pct.textContent = (p * 100).toFixed(0) + '%';
                    if (state.currentTime >= totalDur) {
                        renderFrame(totalDur); ectx.clearRect(0, 0, outW, outH); ectx.fillStyle = state.bgColor; ectx.fillRect(0, 0, outW, outH); ectx.drawImage(stage, 0, 0, outW, outH);
                        state.playing = false; setTimeout(() => recorder.stop(), 200); resolve(); return;
                    }
                    renderFrame(state.currentTime);
                    ectx.clearRect(0, 0, outW, outH); ectx.fillStyle = state.bgColor; ectx.fillRect(0, 0, outW, outH); ectx.drawImage(stage, 0, 0, outW, outH);
                    requestAnimationFrame(exportTick);
                }
                requestAnimationFrame(exportTick);
            });

            await new Promise(r => { recorder.onstop = r; });
            const blob = new Blob(chunks, { type: 'video/mp4' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = 'video.mp4'; a.click();
            overlay.classList.add('hidden');
            isExporting = false;
            toast('Готово! Видео сохранено ✅');
            if (wasPlaying) startPlayback();
        }

        /* =================== NEW PROJECT =================== */
        // long-press undo button area not used; provide reset via double tap top spacer (kept minimal, no extra clutter button)

        /* =================== INIT =================== */
        (function init() {
            renderTracks(); renderTimeline();
            tryRestoreAutosave().then(restored => { $('#autosaveTag').textContent = restored ? 'Восстановлено' : 'Готово'; }).catch(() => { $('#autosaveTag').textContent = 'Автосохранение недоступно'; });
        })();
    </script>
